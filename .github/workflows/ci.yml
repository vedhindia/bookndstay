name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Install vendor dependencies
        working-directory: vendor
        run: npm ci

      - name: Install root dependencies and build frontends
        run: |
          npm install
          npm run deploy

      - name: Upload backend bundle with built frontends
        uses: actions/upload-artifact@v4
        with:
          name: backend-with-built-frontends
          path: |
            backend/**
            !backend/node_modules/**
            !backend/**/*.log

      - name: Deploy backend to VPS server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "backend/**"
          target: "/var/www/bookndstay"

      - name: Install backend dependencies on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/bookndstay/backend
            npm install --omit=dev
            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi
            if pm2 describe bookndstay-backend >/dev/null 2>&1; then
              pm2 restart bookndstay-backend --update-env
            else
              pm2 start server.js --name bookndstay-backend
            fi
            pm2 save
